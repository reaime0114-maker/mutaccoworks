<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Zen+Black&display=swap" rel="stylesheet">
<title>pachimoji</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;font-family:'Zen Black','Hiragino Kaku Gothic ProN',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 40px}
header{width:100%;max-width:700px;padding:12px 16px 8px}
.logo{font-size:15px;letter-spacing:3px;background:linear-gradient(90deg,#ff8800,#ffd700,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ad-banner{width:100%;max-width:700px;height:56px;background:#0d0d0d;border:1px dashed #1e1e1e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#252525;font-size:10px;letter-spacing:2px;margin:0 0 8px}
.main{width:100%;max-width:700px;padding:0 10px;display:flex;flex-direction:column;gap:10px}
#stage{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;box-shadow:0 0 40px rgba(255,50,0,.12)}
#stage canvas{width:100%;height:100%;display:block}
.stage-hint{position:absolute;bottom:8px;right:10px;font-size:9px;color:rgba(255,255,255,.18);pointer-events:none}
.wm{position:absolute;bottom:9px;left:10px;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;pointer-events:none;font-family:sans-serif}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.act-btn{background:#0f0f0f;border:1px solid #1e1e1e;color:#777;font-size:12px;padding:10px 8px;border-radius:8px;cursor:pointer;text-align:center;font-family:'Zen Black',sans-serif;letter-spacing:1px}
.act-btn.dl:hover{background:#150900;border-color:#ff8800;color:#ff8800}
.act-btn.anim.on{background:#001800;border-color:#44ff44;color:#44ff44}
.input-panel{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:11px}
.input-row{display:flex;gap:8px;align-items:center}
.input-lbl{font-size:11px;color:#444;min-width:44px;flex-shrink:0}
input[type=text]{flex:1;background:#060606;border:1px solid #1e1e1e;color:#fff;font-size:16px;padding:9px 12px;border-radius:7px;outline:none;font-family:'Zen Black',sans-serif}
input[type=text]:focus{border-color:#ff8800}
.sec-label{font-size:10px;color:#333;letter-spacing:3px;margin-bottom:5px}
.tmpl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.tmpl-card{background:#060606;border:1.5px solid #1a1a1a;border-radius:8px;padding:7px 5px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.tmpl-card:hover{border-color:#444}
.tmpl-card.on{border-color:#ff8800;background:#130a00;box-shadow:0 0 10px #ff880033}
.tmpl-card .icon{font-size:14px}
.tmpl-card .name{font-size:9px;color:#555;letter-spacing:1px;line-height:1.3}
.tmpl-card.on .name{color:#ffcc44}
.color-preview{height:14px;width:80%;border-radius:3px;margin:2px auto 0}
.bg-preview{width:100%;height:24px;border-radius:3px;margin:2px auto 0;overflow:hidden}
.bg-preview canvas{width:100%;height:100%;display:block}
.gen-btn{width:100%;padding:14px;background:linear-gradient(90deg,#ff1100,#ff7700,#ffee00,#ff7700,#ff1100);background-size:300%;border:none;color:#000;font-weight:900;font-size:16px;letter-spacing:4px;border-radius:10px;cursor:pointer;animation:gbg 2s linear infinite;font-family:'Zen Black',sans-serif}
@keyframes gbg{0%{background-position:0%}100%{background-position:300%}}
.ad-mid{width:100%;height:80px;background:#0d0d0d;border:1px dashed #1e1e1e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#222;font-size:10px;letter-spacing:2px}
footer{width:100%;max-width:700px;padding:16px;text-align:center;font-size:10px;color:#252525;letter-spacing:2px}
</style>
</head>
<body>
<header><div class="logo">pachimoji</div></header>
<div style="width:100%;max-width:700px;padding:0 10px 0"><div class="ad-banner">[ AD ]</div></div>
<div class="main">
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="wm">&#x30D1;&#x30C1;&#x6587;&#x5B57;&#x30E1;&#x30FC;&#x30AB;&#x30FC;<br>&#x3080;&#x305F;&#x5DE5;&#x623F;</div>
    <div class="stage-hint">tap to animate</div>
  </div>
  <div class="action-row">
    <button class="act-btn" id="shareBtn" style="border-color:#1da1f222;color:#4499cc">X share</button>
    <button class="act-btn dl" id="dlBtn" style="border-color:#ff880022;color:#cc7700">PNG</button>
    <button class="act-btn dl" id="gifBtn" style="border-color:#44aaff22;color:#4488cc">GIF</button>
    <button class="act-btn anim" id="animBtn" style="border-color:#44ff4422;color:#338833">play</button>
  </div>
  <div class="input-panel">
    <div class="input-row"><span class="input-lbl">line 1</span><input id="t1" type="text" maxlength="10"></div>
    <div class="input-row"><span class="input-lbl">line 2</span><input id="t2" type="text" maxlength="10"></div>
    <div><div class="sec-label">TEXT COLOR</div><div class="tmpl-grid" id="colorGrid"></div></div>
    <div><div class="sec-label">BACKGROUND</div><div class="tmpl-grid" id="bgGrid"></div></div>
    <button class="gen-btn" id="genBtn">GENERATE</button>
  </div>
  <div class="ad-mid">[ AD ]</div>
</div>
<footer>pachimoji.com</footer>
<script>
(function(){
var W=640,H=360;
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');
cv.width=W;cv.height=H;
document.getElementById('t1').value='\u795e\u56de';
document.getElementById('t2').value='\u78ba\u5b9a\uff01';

var COLORS=[
  {id:'gold',    name:'Gold',   ico:'\uD83E\uDD47',stops:['#fffce0','#ffe566','#cc8800','#ffee88','#7a4200','#ffe566','#cc8800'],rim:'#994400',rim2:'#ffe066',glow:'#ff8800',prev:['#ffe566','#cc8800','#7a4200']},
  {id:'rainbow', name:'Rainbow',ico:'\uD83C\uDF08',stops:['#ff2200','#ff8800','#ffee00','#22ee44','#00aaff','#8833ff','#ff00bb'],rim:'#330066',rim2:'#cc88ff',glow:'#ff44ff',prev:['#ff2200','#00aaff','#ff00bb']},
  {id:'fire',    name:'Fire',   ico:'\uD83D\uDD25',stops:['#ffffff','#ffff88','#ffcc00','#ff8800','#ff3300','#990000','#330000'],rim:'#660000',rim2:'#ffcc44',glow:'#ff4400',prev:['#ffff88','#ff6600','#990000']},
  {id:'bluepink',name:'Neon',   ico:'\uD83D\uDC9C',stops:['#eef8ff','#88ccff','#4488ff','#aa44ff','#ff44cc','#ff8844','#44ccff'],rim:'#220055',rim2:'#cc88ff',glow:'#aa44ff',prev:['#4488ff','#aa44ff','#ff44cc']},
  {id:'diamond', name:'Ice',    ico:'\uD83D\uDC8E',stops:['#ffffff','#eef8ff','#aaddff','#5599dd','#ffffff','#88ccff','#aaddff'],rim:'#002255',rim2:'#88ddff',glow:'#44aaff',prev:['#eef8ff','#5599dd','#aaddff']},
  {id:'green',   name:'Green',  ico:'\uD83D\uDC9A',stops:['#f0fff0','#aaff88','#44dd00','#228800','#aaff44','#55bb00','#114400'],rim:'#114400',rim2:'#aaff44',glow:'#44ff00',prev:['#aaff88','#44dd00','#114400']},
  {id:'rose',    name:'Pink',   ico:'\uD83C\uDF39',stops:['#fff0f5','#ffaacc','#ff4488','#cc0055','#ff88aa','#990033','#440011'],rim:'#660022',rim2:'#ffaacc',glow:'#ff4488',prev:['#ffaacc','#ff4488','#990033']},
  {id:'despair', name:'Navy',   ico:'\uD83D\uDCA4',stops:['#aaccff','#3366cc','#0a1a66','#000833','#1a3399','#000522','#2244bb'],rim:'#000833',rim2:'#1a3399',glow:'#0033cc',prev:['#3366cc','#0a1a66','#000833']}
];

var BGS=[
  {id:'fire_red',   name:'Red',    ico:'\uD83D\uDC26\u200D\uD83D\uDD25'},
  {id:'fire_orange',name:'Thunder',ico:'\u26A1'},
  {id:'rainbow',    name:'Rainbow',ico:'\uD83C\uDF08'},
  {id:'blue',       name:'Dark',   ico:'\u2620\uFE0F'},
  {id:'purple',     name:'Purple', ico:'\uD83D\uDC7E'},
  {id:'green',      name:'Green',  ico:'\uD83C\uDF3F'},
  {id:'gold_bills', name:'Money',  ico:'\uD83D\uDCB0'},
  {id:'pink',       name:'Pink',   ico:'\uD83D\uDC97'}
];

var curC='gold',curB='fire_red',animOn=false,animT=0,rafId=null,fontOK=false;
document.fonts.ready.then(function(){fontOK=true;});

function miniPrev(mc,id){
  var c=mc.getContext('2d'),mw=mc.width,mh=mc.height;
  if(id==='fire_red'){
    c.fillStyle='#200000';c.fillRect(0,0,mw,mh);
    var g=c.createLinearGradient(0,mh,0,0);g.addColorStop(0,'rgba(255,140,0,0.9)');g.addColorStop(0.5,'rgba(200,30,0,0.7)');g.addColorStop(1,'rgba(40,0,0,0.4)');c.fillStyle=g;c.fillRect(0,0,mw,mh);
    for(var i=0;i<5;i++){var px=mw*(0.1+i*0.18),sz=10+i*2;var cg=c.createRadialGradient(px,mh,0,px,mh*0.5,sz);cg.addColorStop(0,'rgba(255,255,150,1)');cg.addColorStop(0.4,'rgba(255,80,0,0.8)');cg.addColorStop(1,'rgba(150,0,0,0)');c.fillStyle=cg;c.beginPath();c.ellipse(px,mh*0.5,sz*0.6,sz,0,0,Math.PI*2);c.fill();}
  } else if(id==='fire_orange'){
    c.fillStyle='#120800';c.fillRect(0,0,mw,mh);
    var bg2=c.createRadialGradient(mw/2,mh/2,0,mw/2,mh/2,mw);bg2.addColorStop(0,'rgba(160,70,0,0.6)');bg2.addColorStop(1,'rgba(8,3,0,0.9)');c.fillStyle=bg2;c.fillRect(0,0,mw,mh);
    c.lineWidth=1;for(var i2=0;i2<5;i2++){var ex=mw*(0.15+i2*0.18),ey=mh*(0.05+i2%2*0.1);c.strokeStyle='rgba(255,240,120,'+(0.5+i2*0.1)+')';c.beginPath();c.moveTo(ex,ey);c.lineTo(ex+(Math.sin(i2)*6),mh/2);c.lineTo(ex+(Math.cos(i2)*4),mh*0.9);c.stroke();}
  } else if(id==='rainbow'){
    c.fillStyle='#fff';c.fillRect(0,0,mw,mh);
    for(var i3=0;i3<18;i3++){var ang3=i3*(Math.PI*2/18);c.save();c.translate(mw/2,mh/2);c.rotate(ang3);c.globalAlpha=0.75;c.fillStyle='hsl('+(i3*(360/18))+',100%,55%)';var sp3=0.17*Math.PI;c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(-sp3)*mw,Math.sin(-sp3)*mw);c.lineTo(Math.cos(sp3)*mw,Math.sin(sp3)*mw);c.closePath();c.fill();c.restore();}
    var wg=c.createRadialGradient(mw/2,mh/2,0,mw/2,mh/2,mw*0.35);wg.addColorStop(0,'rgba(255,255,255,1)');wg.addColorStop(1,'transparent');c.fillStyle=wg;c.fillRect(0,0,mw,mh);
  } else if(id==='blue'){
    c.fillStyle='#020008';c.fillRect(0,0,mw,mh);
    for(var i4=0;i4<18;i4++){var sx=mw*((i4*137.5*0.031)%1),sw=1+i4%3,hue4=i4%3===0?185:i4%3===1?260:210;var sg=c.createLinearGradient(0,0,0,mh);sg.addColorStop(0,'hsla('+hue4+',90%,65%,0.75)');sg.addColorStop(0.55,'hsla('+hue4+',70%,45%,0.35)');sg.addColorStop(1,'transparent');c.fillStyle=sg;c.fillRect(sx,0,sw,mh);}
    var fd=c.createLinearGradient(0,0,0,mh);fd.addColorStop(0.45,'rgba(0,0,0,0)');fd.addColorStop(1,'rgba(0,0,0,0.92)');c.fillStyle=fd;c.fillRect(0,0,mw,mh);
  } else if(id==='purple'){
    c.fillStyle='#08000e';c.fillRect(0,0,mw,mh);
    var bp=c.createRadialGradient(mw/2,mh/2,0,mw/2,mh/2,mw);bp.addColorStop(0,'rgba(100,0,180,0.55)');bp.addColorStop(1,'rgba(4,0,8,0.9)');c.fillStyle=bp;c.fillRect(0,0,mw,mh);
    c.lineWidth=1;for(var i5=0;i5<6;i5++){var px2=mw*(0.1+i5*0.15);c.strokeStyle='hsla('+(260+i5*10)+',100%,75%,'+(0.4+i5%3*0.2)+')';c.beginPath();c.moveTo(px2,0);c.lineTo(px2+(Math.sin(i5*1.2)*5),mh/2);c.lineTo(px2+(Math.cos(i5)*4),mh);c.stroke();}
  } else if(id==='green'){
    c.fillStyle='#44cc44';c.fillRect(0,0,mw,mh);
    var bg4=c.createRadialGradient(mw/2,mh/2,0,mw/2,mh/2,mw);bg4.addColorStop(0,'rgba(160,255,100,0.9)');bg4.addColorStop(0.6,'rgba(40,180,40,0.8)');bg4.addColorStop(1,'rgba(10,100,10,0.7)');c.fillStyle=bg4;c.fillRect(0,0,mw,mh);
    [[0.2,0.35,9],[0.6,0.2,7],[0.5,0.7,11],[0.82,0.55,6],[0.15,0.7,8]].forEach(function(b){c.save();c.strokeStyle='rgba(180,255,160,0.8)';c.lineWidth=1.5;c.beginPath();c.arc(mw*b[0],mh*b[1],b[2],0,Math.PI*2);c.stroke();c.fillStyle='rgba(220,255,210,0.15)';c.fill();c.restore();});
  } else if(id==='gold_bills'){
    var hg=c.createLinearGradient(0,0,0,mh);hg.addColorStop(0,'rgba(30,5,0,1)');hg.addColorStop(0.5,'rgba(255,240,160,1)');hg.addColorStop(1,'rgba(30,5,0,1)');c.fillStyle=hg;c.fillRect(0,0,mw,mh);
    [[0.15,0.3,-0.15],[0.48,0.55,0.08],[0.78,0.72,-0.1]].forEach(function(pos){c.save();c.translate(mw*pos[0],mh*pos[1]);c.rotate(pos[2]);var gd=c.createLinearGradient(-13,-5,13,5);gd.addColorStop(0,'#fff8c0');gd.addColorStop(0.4,'#cc8800');gd.addColorStop(1,'#7a4400');c.fillStyle=gd;c.beginPath();c.roundRect(-13,-5,26,10,1);c.fill();c.strokeStyle='#ffe066';c.lineWidth=0.5;c.stroke();c.restore();});
  } else if(id==='pink'){
    c.fillStyle='#f080a0';c.fillRect(0,0,mw,mh);
    var pg=c.createLinearGradient(0,0,0,mh);pg.addColorStop(0,'rgba(255,255,255,0.85)');pg.addColorStop(0.5,'rgba(255,160,200,0.5)');pg.addColorStop(1,'rgba(220,80,140,0.4)');c.fillStyle=pg;c.fillRect(0,0,mw,mh);
    [[0.18,0.38,7],[0.45,0.25,9],[0.72,0.55,6],[0.33,0.7,5],[0.82,0.28,8],[0.6,0.75,6]].forEach(function(h){var hx=mw*h[0],hy=mh*h[1],sz=h[2];c.save();c.translate(hx,hy);c.fillStyle='rgba(255,255,255,0.88)';c.beginPath();c.moveTo(0,-sz*0.1);c.bezierCurveTo(-sz*0.05,-sz*0.55,-sz*0.5,-sz*0.55,-sz*0.5,-sz*0.2);c.bezierCurveTo(-sz*0.5,sz*0.15,-sz*0.05,sz*0.38,0,sz*0.5);c.bezierCurveTo(sz*0.05,sz*0.38,sz*0.5,sz*0.15,sz*0.5,-sz*0.2);c.bezierCurveTo(sz*0.5,-sz*0.55,sz*0.05,-sz*0.55,0,-sz*0.1);c.closePath();c.fill();c.restore();});
  }
}

function buildGrids(){
  var cg=document.getElementById('colorGrid');
  COLORS.forEach(function(t){
    var el=document.createElement('div');el.className='tmpl-card'+(t.id===curC?' on':'');
    var ico=document.createElement('span');ico.className='icon';ico.textContent=t.ico;el.appendChild(ico);
    var pv=document.createElement('div');pv.className='color-preview';pv.style.background='linear-gradient(90deg,'+t.prev.join(',')+')'
    el.appendChild(pv);
    var nm=document.createElement('div');nm.className='name';nm.textContent=t.name;el.appendChild(nm);
    el.onclick=function(){curC=t.id;document.querySelectorAll('#colorGrid .tmpl-card').forEach(function(x){x.classList.remove('on');});el.classList.add('on');};
    cg.appendChild(el);
  });
  var bg2=document.getElementById('bgGrid');
  BGS.forEach(function(t){
    var el=document.createElement('div');el.className='tmpl-card'+(t.id===curB?' on':'');
    var ico=document.createElement('span');ico.className='icon';ico.textContent=t.ico;el.appendChild(ico);
    var pv=document.createElement('div');pv.className='bg-preview';
    var mc=document.createElement('canvas');mc.width=80;mc.height=24;pv.appendChild(mc);el.appendChild(pv);
    var nm=document.createElement('div');nm.className='name';nm.textContent=t.name;el.appendChild(nm);
    el.onclick=function(){curB=t.id;document.querySelectorAll('#bgGrid .tmpl-card').forEach(function(x){x.classList.remove('on');});el.classList.add('on');};
    bg2.appendChild(el);
    miniPrev(mc,t.id);
  });
}

function dk(hex,f){if(!hex||hex[0]!=='#')return '#000';return 'rgb('+((parseInt(hex.slice(1,3),16)*f)|0)+','+((parseInt(hex.slice(3,5),16)*f)|0)+','+((parseInt(hex.slice(5,7),16)*f)|0)+')';}
function rs(){ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}
function brightenRim(hex){if(!hex||hex[0]!=='#')return hex;return 'rgb('+Math.min(255,(parseInt(hex.slice(1,3),16)*1.4)|0)+','+Math.min(255,(parseInt(hex.slice(3,5),16)*1.4)|0)+','+Math.min(255,(parseInt(hex.slice(5,7),16)*1.4)|0)+')';}

function ltng(x1,y1,x2,y2,d,a,w,col){
  col=col||('rgba(255,235,160,'+a+')');
  if(d<=0||Math.hypot(x2-x1,y2-y1)<5)return;
  var mx=(x1+x2)/2+(Math.random()-0.5)*55,my=(y1+y2)/2+(Math.random()-0.5)*55;
  ctx.strokeStyle=col;ctx.lineWidth=w;ctx.shadowColor=col;ctx.shadowBlur=5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(mx,my);ctx.lineTo(x2,y2);ctx.stroke();
  if(Math.random()<0.45)ltng(mx,my,mx+(Math.random()-0.5)*70,my+(Math.random()-0.5)*70,d-1,a*0.5,w*0.6,col);
  ltng(x1,y1,mx,my,d-1,a*0.7,w*0.7,col);ltng(mx,my,x2,y2,d-1,a*0.7,w*0.7,col);
}

function bgFireRed(t){
  ctx.fillStyle='#180000';ctx.fillRect(0,0,W,H);
  var g=ctx.createLinearGradient(0,H,0,0);g.addColorStop(0,'rgba(255,160,0,0.75)');g.addColorStop(0.25,'rgba(240,50,0,0.6)');g.addColorStop(0.55,'rgba(140,8,0,0.45)');g.addColorStop(1,'rgba(30,0,0,0.3)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

function drawBg(id,t){
  if(id==='fire_red'){bgFireRed(t);return;}
  if(id==='rainbow'){bgRainbow(t);return;}
  if(id==='blue'){bgDark(t);return;}
  if(id==='green'){bgGreen(t);return;}
  if(id==='gold_bills'){bgMoney(t);return;}
  if(id==='pink'){bgPink(t);return;}
  var rays=id==='fire_orange'?['#ff8800','#ffcc00','#ff4400']:['#7700ff','#aa00ff','#4400cc'];
  var dark=id==='fire_orange'?'#120800':'#08000e';
  ctx.fillStyle=dark;ctx.fillRect(0,0,W,H);
  var bgr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);bgr.addColorStop(0,dk(rays[0],0.4));bgr.addColorStop(0.7,dk(rays[1],0.14));bgr.addColorStop(1,'#000');ctx.fillStyle=bgr;ctx.fillRect(0,0,W,H);
  var rot=t*0.005;
  for(var i2=0;i2<150;i2++){var ang=i2*(Math.PI*2/150)+rot,vb=i2%15===0,br2=i2%5===0;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(ang);ctx.globalAlpha=vb?0.82:br2?0.42:0.17;var col=rays[i2%rays.length];var rg=ctx.createLinearGradient(0,0,W,0);if(vb){rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(0.05,'rgba(255,255,240,0.9)');rg.addColorStop(0.2,col);rg.addColorStop(1,'transparent');}else{rg.addColorStop(0,col);rg.addColorStop(0.5,col);rg.addColorStop(1,'transparent');}ctx.fillStyle=rg;var sp2=(vb?0.055:br2?0.028:0.013)*Math.PI;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(-sp2)*W,Math.sin(-sp2)*W);ctx.lineTo(Math.cos(sp2)*W,Math.sin(sp2)*W);ctx.closePath();ctx.fill();ctx.restore();}
  ctx.globalAlpha=1;
  var gc=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,230);gc.addColorStop(0,'rgba(255,255,235,0.8)');gc.addColorStop(0.1,'rgba(255,210,80,0.44)');gc.addColorStop(0.4,'transparent');gc.addColorStop(1,'transparent');ctx.fillStyle=gc;ctx.fillRect(0,0,W,H);
  var vg=ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,W*0.82);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.86)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  if(id==='fire_orange')bgElectric(t,['#fff','#ffff88','#88ffff','#ffaa00'],14);
  if(id==='purple')bgElectric(t,['#fff','#cc88ff','#8844ff','#ff88ff'],24);
  for(var i3=0;i3<150;i3++){var a2=i3*2.399+t*0.013*(i3%2===0?1:-0.7),r2=12+((i3*73.1)%1)*265,x2=W/2+Math.cos(a2)*r2,y2=H/2+Math.sin(a2)*r2,col2=rays[i3%rays.length];ctx.globalAlpha=Math.max(0,0.2+Math.sin(t*0.07+i3*0.4)*0.68);if(i3%9===0){ctx.save();ctx.translate(x2,y2);ctx.rotate(t*0.05+i3);ctx.fillStyle=col2;var sr=2+((i3*37)%1)*5;ctx.beginPath();for(var p6=0;p6<8;p6++){var pr6=p6%2===0?sr:sr*0.3,pa6=p6*Math.PI/4;p6===0?ctx.moveTo(Math.cos(pa6)*pr6,Math.sin(pa6)*pr6):ctx.lineTo(Math.cos(pa6)*pr6,Math.sin(pa6)*pr6);}ctx.closePath();ctx.fill();ctx.restore();}else{ctx.fillStyle=col2;ctx.beginPath();ctx.arc(x2,y2,0.5+((i3*53)%1)*2.5,0,Math.PI*2);ctx.fill();}}

  if(id!=='fire_orange'&&id!=='purple'){ctx.save();ctx.globalAlpha=0.38;for(var i4=0;i4<5;i4++){var a3=(i4*137.5+Math.floor(t/4)*23)%360*Math.PI/180,r3=40+((i4*73)%1)*100;ltng(W/2+Math.cos(a3)*r3,H/2+Math.sin(a3)*r3,W/2+Math.cos(a3+0.6)*W*0.5,H/2+Math.sin(a3+0.6)*H*0.5,3,0.8,1.2);}ctx.restore();}

function drawTwoLines(t1,t2,cy1,cy2,fs1,fs2,col,pulse,shk){

  var os=document.createElement('canvas');os.width=W;os.height=H;var sc=os.getContext('2d');sc.fillStyle='#000';
  sc.save();AT(sc,W/2+shk,cy1,fs1*pulse,-0.035,-0.04);sc.lineWidth=fs1*pulse*0.62;sc.strokeStyle='#000';sc.strokeText(t1,0,0);sc.fillText(t1,0,0);sc.restore();
  if(t2){sc.save();AT(sc,W/2-shk*0.5,cy2,fs2*pulse,-0.035,-0.04);sc.lineWidth=fs2*pulse*0.62;sc.strokeStyle='#000';sc.strokeText(t2,0,0);sc.fillText(t2,0,0);sc.restore();}
  [[0.60,'#000'],[0.50,dk(col.rim,0.65)],[0.40,'#000'],[0.30,brightenRim(col.rim2)],[0.18,'#000'],[0.10,brightenRim(col.rim2)],[0.04,'#000'],[0.016,col.rim2]].forEach(function(lr){ctx.save();ctx.save();AT(ctx,W/2+shk,cy1,fs1*pulse,-0.035,-0.04);ctx.lineWidth=fs1*pulse*lr[0];ctx.strokeStyle=lr[1];ctx.strokeText(t1,0,0);ctx.restore();    if(t2){ctx.save();AT(ctx,W/2-shk*0.5,cy2,fs2*pulse,-0.035,-0.04);ctx.lineWidth=fs2*pulse*lr[0];ctx.strokeStyle=lr[1];ctx.strokeText(t2,0,0);ctx.restore();}ctx.restore();});
  function mkMask(){var mo=document.createElement('canvas');mo.width=W;mo.height=H;var mc=mo.getContext('2d');mc.save();AT(mc,W/2+shk,cy1,fs1*pulse,-0.035,-0.04);mc.lineWidth=fs1*pulse*0.46;mc.strokeStyle='rgba(255,255,255,1)';mc.strokeText(t1,0,0);mc.restore();    if(t2){mc.save();AT(mc,W/2-shk*0.5,cy2,fs2*pulse,-0.035,-0.04);mc.lineWidth=fs2*pulse*0.46;mc.strokeStyle='rgba(255,255,255,1)';mc.strokeText(t2,0,0);mc.restore();}mc.globalCompositeOperation='destination-out';mc.save();AT(mc,W/2+shk,cy1,fs1*pulse,-0.035,-0.04);mc.lineWidth=fs1*pulse*0.17;mc.strokeStyle='#000';mc.strokeText(t1,0,0);mc.fillStyle='#000';mc.fillText(t1,0,0);mc.restore();if(t2){mc.save();AT(mc,W/2-shk*0.5,cy2,fs2*pulse,-0.035,-0.04);mc.lineWidth=fs2*pulse*0.17;mc.strokeStyle='#000';mc.strokeText(t2,0,0);mc.fillStyle='#000';mc.fillText(t2,0,0);mc.restore();}return mo;}
  var rimMask=mkMask();
  function addGloss(stops){var go=document.createElement('canvas');go.width=W;go.height=H;var gc2=go.getContext('2d');var g=ctx.createLinearGradient(0,0,0,H);stops.forEach(function(s){g.addColorStop(s[0],s[1]);});gc2.fillStyle=g;gc2.fillRect(0,0,W,H);gc2.globalCompositeOperation='destination-in';gc2.drawImage(rimMask,0,0);ctx.drawImage(go,0,0);}
  addGloss([[0,'rgba(255,255,255,0)'],[0.12,'rgba(255,255,255,0)'],[0.24,'rgba(255,255,248,0.88)'],[0.34,'rgba(255,255,220,0.32)'],[0.44,'rgba(255,255,200,0)']]);
  addGloss([[0,'rgba(255,220,80,0)'],[0.36,'rgba(255,220,80,0)'],[0.49,'rgba(255,205,70,0.24)'],[0.6,'rgba(255,220,80,0)']]);
  addGloss([[0,'rgba(0,0,0,0)'],[0.52,'rgba(0,0,0,0)'],[0.7,'rgba(0,0,0,0.26)'],[0.85,'rgba(0,0,0,0.50)'],[1,'rgba(0,0,0,0.56)']]);
  addGloss([[0,'rgba(255,240,170,0.32)'],[0.14,'rgba(255,240,170,0.14)'],[0.36,'rgba(255,240,170,0)']]);
  addGloss([[0,'rgba(255,240,170,0)'],[0.62,'rgba(255,240,170,0)'],[0.86,'rgba(255,240,170,0.16)'],[1,'rgba(255,240,170,0.28)']]);
  var oc=document.createElement('canvas');oc.width=W;oc.height=H;var cc=oc.getContext('2d');
  [[t1,W/2+shk,cy1,fs1*pulse,-0.035,-0.04],[t2||null,W/2-shk*0.5,cy2,fs2*pulse,-0.035,-0.04]].forEach(function(d){if(!d[0])return;cc.save();AT(cc,d[1],d[2],d[3],d[4],d[5]);var fg=cc.createLinearGradient(0,-d[3]*0.58,0,d[3]*0.58);col.stops.forEach(function(c,idx){fg.addColorStop(idx/(col.stops.length-1),c);});cc.fillStyle=fg;cc.fillText(d[0],0,0);cc.save();cc.beginPath();cc.rect(-W,-d[3]*0.6,W*2,d[3]*0.3);cc.clip();cc.globalAlpha=0.46;cc.fillStyle='rgba(255,255,248,1)';cc.fillText(d[0],0,0);cc.restore();cc.save();cc.beginPath();cc.rect(-W,d[3]*0.06,W*2,d[3]*0.09);cc.clip();cc.globalAlpha=0.18;cc.fillStyle='rgba(255,255,210,1)';cc.fillText(d[0],0,0);cc.restore();cc.restore();});

function render(t){
  t=t||0;ctx.clearRect(0,0,W,H);drawBg(curB,t);
  var t1=document.getElementById('t1').value||'pachimoji',t2=document.getElementById('t2').value||'',has2=t2.trim().length>0;
  var col=COLORS[0];for(var i=0;i<COLORS.length;i++){if(COLORS[i].id===curC){col=COLORS[i];break;}}
  var pulse=animOn?1+Math.sin(t*0.13)*0.045:1,shk=animOn?Math.sin(t*0.2)*2.5:0;
  // 横幅制限（係数を0.74→0.62に厳しく、最大幅も88%→78%に）
  var maxFontW=Math.floor(W*0.78/Math.max(t1.length,1)/0.62);
  // 縦幅制限
  var maxFontH=has2?Math.floor(H*0.38):Math.floor(H*0.65);
  var fs1=Math.min(130,maxFontW,maxFontH);
  var maxFontW2=has2?Math.floor(W*0.78/Math.max(t2.length,1)/0.62):fs1;
  var fs2=has2?Math.min(130,maxFontW2,maxFontH):fs1;
  if(!has2){drawTwoLines(t1,null,H/2,H/2,fs1,fs1,col,pulse,shk);}
  else{var h1=fs1*1.60*pulse,h2=fs2*1.60*pulse,sc2=(h1+h2)>H*0.92?H*0.92/(h1+h2):1,cy1=H/2-(h2*sc2)/2*0.85,cy2=H/2+(h1*sc2)/2*0.85;drawTwoLines(t1,t2,cy1,cy2,fs1,fs2,col,pulse,shk);}
}

document.getElementById('genBtn').onclick=function(){stopAnim();render(0);};
cv.onclick=function(){if(animOn)stopAnim();else startAnim();};
document.getElementById('animBtn').onclick=function(){var b=document.getElementById('animBtn');if(animOn){stopAnim();b.textContent='play';b.classList.remove('on');}else{startAnim();b.textContent='stop';b.classList.add('on');}};
document.getElementById('dlBtn').onclick=function(){stopAnim();render(0);var a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='pachimoji.png';a.click();};

document.getElementById('gifBtn').onclick=function(){
  var btn=document.getElementById('gifBtn');
  btn.textContent='...';btn.style.opacity='0.5';
  // gif.jsを動的ロード
  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js';
  script.onload=function(){
    var gif=new GIF({workers:2,quality:8,width:W,height:H,workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'});
    var frames=60,delay=50;
    for(var f=0;f<frames;f++){
      render(f*2);
      gif.addFrame(cv,{copy:true,delay:delay});
    }
    gif.on('finished',function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='pachimoji.gif';a.click();
      btn.textContent='GIF';btn.style.opacity='1';
      render(0);
    });
    gif.render();
  };
  script.onerror=function(){btn.textContent='GIF';btn.style.opacity='1';alert('GIF生成に失敗しました');};
  document.head.appendChild(script);
};
document.getElementById('shareBtn').onclick=function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('#pachimoji #\u3080\u305f\u5de5\u623f'),'_blank');};
function startAnim(){animOn=true;document.getElementById('animBtn').textContent='stop';document.getElementById('animBtn').classList.add('on');step();}
function stopAnim(){animOn=false;cancelAnimationFrame(rafId);document.getElementById('animBtn').textContent='play';document.getElementById('animBtn').classList.remove('on');}
function step(){animT++;render(animT);if(animOn)rafId=requestAnimationFrame(step);}
buildGrids();render(0);
})();
</script>
