*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;font-family:'Zen Black','Hiragino Kaku Gothic ProN',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 40px}
header{width:100%;max-width:700px;padding:12px 16px 8px}
.logo-ja{font-size:15px;letter-spacing:3px;background:linear-gradient(90deg,#ff8800,#ffd700,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.logo-en{font-size:9px;letter-spacing:2px;color:#aaa;font-family:sans-serif}

.main{width:100%;max-width:700px;padding:0 10px;display:flex;flex-direction:column;gap:10px}
#stage{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;box-shadow:0 0 40px rgba(255,50,0,.12)}
#stage canvas{width:100%;height:100%;display:block}
.stage-hint{position:absolute;bottom:8px;right:10px;font-size:9px;color:rgba(255,255,255,.65);pointer-events:none}
.wm{position:absolute;bottom:9px;left:10px;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;pointer-events:none;font-family:sans-serif}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.act-btn{background:#0f0f0f;border:1px solid #1e1e1e;color:#aaa;font-size:12px;padding:10px 8px;border-radius:8px;cursor:pointer;text-align:center;font-family:'Zen Black',sans-serif;letter-spacing:1px}
.act-btn.dl:hover{background:#150900;border-color:#ff8800;color:#ff8800}
.act-btn.anim.on{background:#001800;border-color:#44ff44;color:#44ff44}
.input-panel{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:11px}
.input-row{display:flex;gap:8px;align-items:center}
.input-lbl{font-size:11px;color:#ccc;min-width:44px;flex-shrink:0}
input[type=text]{flex:1;background:#060606;border:1px solid #1e1e1e;color:#fff;font-size:16px;padding:9px 12px;border-radius:7px;outline:none;font-family:'Zen Black',sans-serif}
input[type=text]:focus{border-color:#ff8800}
.sec-label{font-size:10px;color:#aaa;letter-spacing:3px;margin-bottom:5px}
.tmpl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.tmpl-card{background:#060606;border:1.5px solid #1a1a1a;border-radius:8px;padding:7px 5px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.tmpl-card:hover{border-color:#444}
.tmpl-card.on{border-color:#ff8800;background:#130a00;box-shadow:0 0 10px #ff880033}
.tmpl-card .icon{font-size:14px}
.tmpl-card .name{font-size:9px;color:#bbb;letter-spacing:1px;line-height:1.3}
.tmpl-card.on .name{color:#ffcc44}
.color-preview{height:14px;width:80%;border-radius:3px;margin:2px auto 0}
.bg-preview{width:100%;height:24px;border-radius:3px;margin:2px auto 0;overflow:hidden}
.bg-preview canvas{width:100%;height:100%;display:block}
.gen-btn{width:100%;padding:14px;background:linear-gradient(90deg,#ff1100,#ff7700,#ffee00,#ff7700,#ff1100);background-size:300%;border:none;color:#000;font-weight:900;font-size:16px;letter-spacing:4px;border-radius:10px;cursor:pointer;animation:gbg 2s linear infinite;font-family:'Zen Black',sans-serif}

.ad-mid{width:100%;height:80px;background:#0d0d0d;border:1px dashed #1e1e1e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px;letter-spacing:2px}
footer{width:100%;max-width:700px;padding:16px;text-align:center;font-size:10px;color:#aaa;letter-spacing:2px}

#adModalBox{width:88%;max-width:340px;background:#111;border:1px solid #333;border-radius:14px;overflow:hidden;font-family:sans-serif;}
#adModalTop{background:#1a1a1a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
#adModalTop .ad-label{font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase;}

#adModalBottom{padding:14px 16px;}
#adModalBottom .ad-msg{font-size:12px;color:#aaa;text-align:center;margin-bottom:10px;letter-spacing:1px;}
#adModalBottom .ad-msg strong{color:#ffcc00;}
#adProgress{width:100%;height:4px;background:#222;border-radius:2px;overflow:hidden;margin-bottom:12px;}
#adProgressBar{height:100%;width:0%;background:linear-gradient(90deg,#ff8800,#ffcc00);border-radius:2px;transition:width 0.1s linear;}
#adSaveBtn{width:100%;padding:12px;background:#333;border:none;color:#666;font-size:13px;font-weight:700;letter-spacing:2px;border-radius:8px;cursor:not-allowed;}
#adSaveBtn.ready{background:linear-gradient(90deg,#ff1100,#ff7700,#ffee00,#ff7700,#ff1100);background-size:300%;animation:gbg 2s linear infinite;color:#000;cursor:pointer;}

<header><div><div class="logo-ja">パチ文字メーカー</div><div class="logo-en">むたっこ製作所</div></div></header>
<!-- SVGフィルター定義 -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1.2" specularExponent="18" result="spec" lighting-color="white">
        <fePointLight x="200" y="-100" z="300"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.6" k4="0"/>
    </filter>
  </defs>
</svg>
<div id="adModal">
  <div id="adModalBox">

      <button id="adSaveBtn" disabled>Please wait...</button>

  </div>
</div>

  <div style="padding:0;"><div class="ad-banner">[ AD ]</div></div>

</div>

    var pv=document.createElement('div');pv.className='color-preview';pv.style.background='linear-gradient(90deg,'+t.prev.join(',')+')'

function dk(hex,f){if(!hex||hex[0]!=='#')return '#000';return 'rgb('+((parseInt(hex.slice(1,3),16)*f)|0)+','+((parseInt(hex.slice(3,5),16)*f)|0)+','+((parseInt(hex.slice(5,7),16)*f)|0)+')';}
function rs(){ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}
function brightenRim(hex){if(!hex||hex[0]!=='#')return hex;return 'rgb('+Math.min(255,(parseInt(hex.slice(1,3),16)*1.4)|0)+','+Math.min(255,(parseInt(hex.slice(3,5),16)*1.4)|0)+','+Math.min(255,(parseInt(hex.slice(5,7),16)*1.4)|0)+')';}

function ltng(x1,y1,x2,y2,d,a,w,col){
  col=col||('rgba(255,235,160,'+a+')');
  if(d<=0||Math.hypot(x2-x1,y2-y1)<5)return;
  var mx=(x1+x2)/2+(Math.random()-0.5)*55,my=(y1+y2)/2+(Math.random()-0.5)*55;
  ctx.strokeStyle=col;ctx.lineWidth=w;ctx.shadowColor=col;ctx.shadowBlur=3;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(mx,my);ctx.lineTo(x2,y2);ctx.stroke();
  if(Math.random()<0.45)ltng(mx,my,mx+(Math.random()-0.5)*70,my+(Math.random()-0.5)*70,d-1,a*0.5,w*0.6,col);
  ltng(x1,y1,mx,my,d-1,a*0.7,w*0.7,col);ltng(mx,my,x2,y2,d-1,a*0.7,w*0.7,col);
}

function drawCenterGlow(t){

  var rot=t*0.004;
  var scaleX=1.4, scaleY=0.7; // 横長楕円
  for(var i=0;i<numRays;i++){
    var ang=i*(Math.PI*2/numRays)+rot;
    var bright=i%20===0?0.50:i%10===0?0.30:i%5===0?0.15:0.07;
    var reach=W*(0.45+((i*73)%1)*0.25);
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(scaleX,scaleY);
    ctx.rotate(ang);

    rg.addColorStop(0.6,'rgba(255,255,255,'+(bright*0.4)+')');
    rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg;
    var sp=0.0015*Math.PI;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(-sp)*reach,Math.sin(-sp)*reach);
    ctx.lineTo(Math.cos(sp)*reach,Math.sin(sp)*reach);
    ctx.closePath();ctx.fill();ctx.restore();
  }
  // 中央の大きな白い発光（横長楕円・より広く）
  var cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.65);

  cg.addColorStop(0.50,'rgba(255,255,255,0.18)');

  cg.addColorStop(0.85,'rgba(255,255,255,0.01)');
  cg.addColorStop(1.0,'rgba(255,255,255,0)');
  ctx.fillStyle=cg;
  ctx.fillRect(0,0,W,H);
}

      // 金縁のシルエットを作る
      var chars2=d[0].split('');var tw2=0;
      var tc2=document.createElement('canvas').getContext('2d');
      tc2.font='900 '+fs_+'px '+(fontOK?'\'Zen Black\'':'\'Hiragino Kaku Gothic ProN\',\'Meiryo\'')+',sans-serif';
      var w2=chars2.map(function(c){var w=tc2.measureText(c).width;tw2+=w;return w;});
      var sx2=cx_-tw2/2;
      chars2.forEach(function(ch,idx){
        var cw=w2[idx];var ccx=sx2+cw/2;sx2+=cw;
        rmc.save();AT(rmc,ccx+fs_*0.05,cy__+fs_*0.065,fs_,-0.035,-0.04);
        rmc.lineWidth=fs_*0.22;rmc.lineJoin='round';rmc.strokeStyle='#fff';rmc.strokeText(ch,0,0);
        rmc.globalCompositeOperation='destination-out';
        rmc.lineWidth=fs_*0.05;rmc.strokeStyle='#000';rmc.strokeText(ch,0,0);
        rmc.fillStyle='#000';rmc.fillText(ch,0,0);rmc.restore();
      });
      makeShineCanvas(rimMaskC);
    }
  });
}

function render(t){
  t=t||0;ctx.clearRect(0,0,W,H);
  var useB=animOn||gifRecording?lockedB:curB;
  var useC=animOn||gifRecording?lockedC:curC;
  var useT1=animOn||gifRecording?lockedT1:(document.getElementById('t1').value||'5000兆円');
  var useT2=animOn||gifRecording?lockedT2:document.getElementById('t2').value;
  drawBg(useB,t);
  var t1=useT1,t2=useT2,has2=t2.trim().length>0;
  var col=COLORS[0];for(var i=0;i<COLORS.length;i++){if(COLORS[i].id===useC){col=COLORS[i];break;}}
  var pulse=animOn||gifRecording?1+Math.sin(t*0.13)*0.045:1,shk=animOn||gifRecording?Math.sin(t*0.2)*2.5:0;
  // 横幅制限（係数を0.74→0.62に厳しく、最大幅も88%→78%に）
  var maxFontW=Math.floor(W*0.60/Math.max(t1.length,1)/0.62);
  // 縦幅制限
  var maxFontH=has2?Math.floor(H*0.38):Math.floor(H*0.65);
  var fs1=Math.min(130,maxFontW,maxFontH);
  var maxFontW2=has2?Math.floor(W*0.60/Math.max(t2.length,1)/0.62):fs1;
  var fs2=has2?Math.min(130,maxFontW2,maxFontH):fs1;
  if(!has2){drawTwoLines(t1,null,H/2,H/2,fs1,fs1,col,pulse,shk,t);}
  else{var h1=fs1*1.60*pulse,h2=fs2*1.60*pulse,sc2=(h1+h2)>H*0.92?H*0.92/(h1+h2):1,cy1=H/2-(h2*sc2)/2*0.80,cy2=H/2+(h1*sc2)/2*0.80;drawTwoLines(t1,t2,cy1,cy2,fs1,fs2,col,pulse,shk,t);}

  // キラキラエフェクト（ネイビー以外）
  if(col.id!=='despair'){
  var isGoldRimColorR=(col.id==='gold'||col.id==='fire'||col.id==='green'||col.id==='rainbow');
  var sparkColor=isGoldRimColorR?'255,255,220':'220,240,255';

  // 文字のシルエットでclip
  var sparkMask=document.createElement('canvas');sparkMask.width=W;sparkMask.height=H;
  var smc=sparkMask.getContext('2d');
  var fs1s=Math.min(130,Math.floor(W*0.88/Math.max(t1.length,1)/0.62),Math.floor(H*(has2?0.42:0.72)));
  var fs2s=has2?Math.min(130,Math.floor(W*0.60/Math.max(t2.length,1)/0.62),Math.floor(H*0.42)):fs1s;
  var cy1s=has2?H/2-(fs2s*1.60)/2*0.80:H/2;
  var cy2s=has2?H/2+(fs1s*1.60)/2*0.80:H/2;
  [[t1,W/2+shk,cy1s,fs1s],[t2||null,W/2+shk,cy2s,fs2s]].forEach(function(d){
    if(!d[0])return;
    smc.save();smc.translate(d[1],d[2]);
    smc.font='900 '+d[3]+'px \'Hiragino Kaku Gothic ProN\',\'Meiryo\',sans-serif';
    smc.textAlign='center';smc.textBaseline='middle';
    smc.lineWidth=d[3]*0.3;smc.strokeStyle='#fff';smc.strokeText(d[0],0,0);
    smc.fillStyle='#fff';smc.fillText(d[0],0,0);
    smc.restore();
  });

  ctx.save();
  ctx.globalCompositeOperation='source-over';

  var sparkSeeds=[
    {x:0.08,y:0.35,p:0.00},{x:0.25,y:0.20,p:0.15},{x:0.45,y:0.28,p:0.30},
    {x:0.65,y:0.18,p:0.45},{x:0.82,y:0.32,p:0.60},{x:0.92,y:0.22,p:0.75},
    {x:0.15,y:0.68,p:0.20},{x:0.35,y:0.75,p:0.55},{x:0.55,y:0.65,p:0.38},
    {x:0.75,y:0.72,p:0.82},{x:0.90,y:0.62,p:0.10},{x:0.48,y:0.48,p:0.68},
    {x:0.30,y:0.42,p:0.25},{x:0.70,y:0.55,p:0.50},{x:0.18,y:0.52,p:0.90},
  ];

  // シルエットのピクセルデータを取得してキラキラ位置をフィルタ
  var smData=smc.getImageData(0,0,W,H).data;

  sparkSeeds.forEach(function(sp){
    var px=Math.floor(W*sp.x), py=Math.floor(H*sp.y);
    var idx=(py*W+px)*4;
    if(smData[idx+3]<30)return; // 文字のない部分はスキップ

    var alpha=Math.max(0,Math.sin((t*0.022+sp.p)*Math.PI*2)*0.5+0.5);
    if(alpha<0.05)return;
    var sx2=W*sp.x, sy2=H*sp.y;
    var sz=(20+sp.p*25)*pulse;
    ctx.save();
    ctx.globalAlpha=alpha*0.9;
    ctx.translate(sx2,sy2);
    [0,45,90,135].forEach(function(deg){
      ctx.save();
      ctx.rotate(deg*Math.PI/180);
      var len=deg%90===0?sz:sz*0.6;
      var wid=deg%90===0?sz*0.06:sz*0.04;
      var sg=ctx.createLinearGradient(0,-len,0,len);
      sg.addColorStop(0,'rgba('+sparkColor+',0)');
      sg.addColorStop(0.4,'rgba('+sparkColor+','+alpha+')');
      sg.addColorStop(0.5,'rgba(255,255,255,1)');
      sg.addColorStop(0.6,'rgba('+sparkColor+','+alpha+')');
      sg.addColorStop(1,'rgba('+sparkColor+',0)');
      ctx.fillStyle=sg;
      ctx.fillRect(-wid,-len,wid*2,len*2);
      ctx.restore();
    });
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.beginPath();ctx.arc(0,0,sz*0.08,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  ctx.restore();
  } // end キラキラ
  drawWatermark();
  // 静止画のときだけSVGベベルフィルターを適用
  if(!animOn&&!gifRecording){
    applyBevelFilter(col.glow,function(){drawWatermark();});
  }
}

// SVGフィルターをcanvasに適用して再描画
function applyBevelFilter(glowColor,callback){
  var dataUrl=cv.toDataURL('image/png');
  // 光源を左上1点に絞り、specularExponentを最大にして
  // 「スポットライトが当たった箇所だけ光る」状態を再現
  // 文字の左上エッジ・上辺エッジのみに強い反射が出るよう設計
  var svgStr='<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="'+W+'" height="'+H+'">'
    +'<defs>'
    +'<filter id="pf" x="-10%" y="-10%" width="120%" height="120%">'
    // stdDeviation極小（0.5）で反射帯を点〜線状に絞る
    +'<feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="b1"/>'
    +'<feGaussianBlur in="SourceAlpha" stdDeviation="1.0" result="b2"/>'
    // メイン光源：左上スポットライト（点光源・高specExp）
    // z値を小さくすることで影響範囲を絞る
    +'<feSpecularLighting in="b1" surfaceScale="22" specularConstant="4.0" specularExponent="80" lighting-color="#ffffff" result="s1">'
    +'<fePointLight x="'+(-W*0.15)+'" y="'+(-H*0.5)+'" z="80"/>'
    +'</feSpecularLighting>'
    +'<feComposite in="s1" in2="SourceAlpha" operator="in" result="s1o"/>'
    // サブ光源：上辺中央（左から2〜3文字目に当たる位置）
    +'<feSpecularLighting in="b1" surfaceScale="18" specularConstant="2.5" specularExponent="75" lighting-color="#fffde0" result="s2">'
    +'<fePointLight x="'+(W*0.3)+'" y="'+(-H*0.6)+'" z="90"/>'
    +'</feSpecularLighting>'
    +'<feComposite in="s2" in2="SourceAlpha" operator="in" result="s2o"/>'
    // サブ光源2：右寄り（右側の文字に別の反射）
    +'<feSpecularLighting in="b1" surfaceScale="15" specularConstant="2.0" specularExponent="70" lighting-color="#fff5c0" result="s3">'
    +'<fePointLight x="'+(W*0.85)+'" y="'+(-H*0.45)+'" z="100"/>'
    +'</feSpecularLighting>'
    +'<feComposite in="s3" in2="SourceAlpha" operator="in" result="s3o"/>'
    // 黒影（奥行き・右下）
    +'<feDropShadow dx="4" dy="5" stdDeviation="2" flood-color="#000" flood-opacity="0.98"/>'
    // 発光（最小限・カラーに合わせる）
    +'<feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="'+glowColor+'" flood-opacity="0.35"/>'
    // 合成：影→サブ反射→メイン反射→元画像
    // ※s4（ベベル全体）は削除して均一な光をなくす
    +'<feMerge>'
    +'<feMergeNode/>'
    +'<feMergeNode in="s3o"/>'
    +'<feMergeNode in="s2o"/>'
    +'<feMergeNode in="s1o"/>'
    +'<feMergeNode in="SourceGraphic"/>'
    +'</feMerge>'
    +'</filter>'
    +'</defs>'
    +'<image filter="url(#pf)" href="'+dataUrl+'" width="'+W+'" height="'+H+'"/>'
    +'</svg>';
  var svgDataUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  var svgImg=new Image();
  svgImg.onload=function(){ctx.clearRect(0,0,W,H);ctx.drawImage(svgImg,0,0);if(callback)callback();};
  svgImg.onerror=function(){if(callback)callback();};
  svgImg.src=svgDataUrl;
}

// 広告モーダル処理
var adCallback=null;
function showAdModal(cb){
  adCallback=cb;
  var modal=document.getElementById('adModal');
  var bar=document.getElementById('adProgressBar');
  var count=document.getElementById('adSkipCount');
  var btn=document.getElementById('adSaveBtn');
  btn.className='';btn.disabled=true;btn.textContent='Please wait...';
  bar.style.width='0%';count.textContent='5';
  modal.classList.add('show');
  var elapsed=0,total=5000,interval=50;
  var timer=setInterval(function(){
    elapsed+=interval;
    bar.style.width=Math.min(100,elapsed/total*100)+'%';
    count.textContent=Math.max(0,Math.ceil((total-elapsed)/1000));
    if(elapsed>=total){
      clearInterval(timer);
      btn.className='ready';btn.disabled=false;btn.textContent='Save →';count.textContent='0';
    }
  },interval);
  btn.onclick=function(){if(!btn.disabled&&btn.className==='ready'){modal.classList.remove('show');if(adCallback)adCallback();adCallback=null;}};
}
function drawWatermark(){ctx.save();ctx.globalAlpha=0.65;ctx.fillStyle='#ffffff';ctx.font='14px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText('パチ文字メーカー',10,H-16);ctx.fillText('むたっこ製作所',10,H-4);ctx.restore();}
var lockedB='gold_bills',lockedC='gold',lockedT1='5000兆円',lockedT2='欲しい！';
document.getElementById('genBtn').onclick=function(){
  lockedB=curB;lockedC=curC;
  lockedT1=document.getElementById('t1').value||'5000兆円';
  lockedT2=document.getElementById('t2').value;
  if(!animOn){startAnim();}
};
cv.onclick=function(){if(animOn)stopAnim();else startAnim();};
document.getElementById('animBtn').onclick=function(){var b=document.getElementById('animBtn');if(animOn){stopAnim();b.textContent='play';b.classList.remove('on');}else{startAnim();b.textContent='stop';b.classList.add('on');}};
document.getElementById('dlBtn').onclick=function(){stopAnim();render(0);showAdModal(function(){var a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='pachimoji.png';a.click();});};

var gifRecording=false;
function makeGif(btn){
  var GIF_CDN='https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js';
  var WORKER_CDN='https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js';
  btn.textContent='loading...';btn.style.opacity='0.5';
  fetch(WORKER_CDN).then(function(r){return r.blob();}).then(function(workerBlob){
    var workerUrl=URL.createObjectURL(workerBlob);
    var script=document.createElement('script');
    script.src=GIF_CDN;
    script.onload=function(){
      btn.textContent='saving...';
      var gif=new GIF({workers:2,quality:6,width:W,height:H,workerScript:workerUrl});
      var frames=36,delay=100;
      stopAnim();
      gifRecording=true;
      for(var f=0;f<frames;f++){render(f*2);drawWatermark();gif.addFrame(cv,{copy:true,delay:delay});}
      gifRecording=false;
      gif.on('finished',function(blob){
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download='pachimoji.gif';a.click();
        URL.revokeObjectURL(workerUrl);
        btn.textContent='Save(GIF)';btn.style.opacity='1';
        startAnim();
      });
      gif.render();
    };
    script.onerror=function(){btn.textContent='Save(GIF)';btn.style.opacity='1';alert('GIF生成に失敗しました');};
    document.head.appendChild(script);
  }).catch(function(){btn.textContent='Save(GIF)';btn.style.opacity='1';alert('GIF生成に失敗しました');});
}
document.getElementById('gifBtn').onclick=function(){var self=this;showAdModal(function(){makeGif(self);});};
document.getElementById('shareBtn').onclick=function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('https://mutaccoworks.github.io/pachimoji.html\n#むたっこ製作所 #パチ文字メーカー'),'_blank');};
function startAnim(){animOn=true;document.getElementById('animBtn').textContent='stop';document.getElementById('animBtn').classList.add('on');step();}
function stopAnim(){animOn=false;cancelAnimationFrame(rafId);document.getElementById('animBtn').textContent='play';document.getElementById('animBtn').classList.remove('on');}
var animTF=0; // 小数点対応のframeカウンター
var _skipFrame=0;function step(){_skipFrame++;animTF+=1.5;animT=Math.floor(animTF);if(_skipFrame%2===0)render(animT);else if(!animOn)render(animT);if(animOn)rafId=requestAnimationFrame(step);}
buildGrids();
document.getElementById('t1').value='5000兆円';
document.getElementById('t2').value='欲しい！';
startAnim();
})();
</script>
